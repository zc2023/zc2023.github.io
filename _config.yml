# Site Settings
locale                   : "en-US"
title                    : "Cheng Zhang"
title_separator          : "-"
name                     : "Cheng Zhang"
description              : &description "Personal website of Cheng Zhang, a graduate student at HUST working on multimodal large language models, embodied AI, and 3D vision."
url                      : https://zc2023.github.io # the base hostname & protocol for your site e.g. "https://mmistakes.github.io"
baseurl                  : "" # the subpath of your site, e.g. "/blog"
repository               : "zc2023/zc2023.github.io"

# Social Sharing
og_image                 : "LOGOpro.png"
# For specifying social profiles
# - https://developers.google.com/structured-data/customize/social-profiles
social:
  type                   : "Person" # Person or Organization (defaults to Person)
  name                   : "Cheng Zhang" # If the user or organization name differs from the site's name
  links: # An array of links to social media profiles
    - "https://github.com/zc2023"
    - "https://scholar.google.com/citations?user=YVDMI8EAAAAJ&hl=en"
    - "https://orcid.org/0000-0001-6831-5103"


# Site Author
# 边栏信息修改：
author:
  name             : "Cheng Zhang | 张 诚"
  avatar           : "LOGOpro.png"
  bio              : "Second year graduate student at HUST."
  location         : "Wuhan, China"
  employer         : "HUST"
  googlescholar    : "https://scholar.google.com/citations?user=YVDMI8EAAAAJ&hl=en"
  email            : "czhang2024@hust.edu.cn"
  github           : "zc2023"
  orcid            : "https://orcid.org/0000-0001-6831-5103"

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - config
  - gulpfile.js
  - log
  - node_modules
  - push.sh
  - tmp
  - vendor
keep_files:
  - .git
encoding: "utf-8"


# Conversion
markdown: kramdown
highlighter: rouge


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false


# Defaults
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed


# Outputting
permalink: /:categories/:title/
timezone: "Asia/Shanghai"


# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from
# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
