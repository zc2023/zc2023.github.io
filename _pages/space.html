---
layout: none
title: "Space"
permalink: /space/
---

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <title>3D Space</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.32);
            --accent: #0984e3;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        
        /* UI 控制层 */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            width: min(260px, calc(100vw - 40px));
            background: var(--glass-bg);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            color: #fff;
            user-select: none;
        }
        
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); }
        label { font-size: 14px; font-weight: bold; display: block; margin-bottom: 5px; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        #time-display { font-size: 12px; margin-top: 5px; opacity: 0.9; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

        .control-row {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-top: 16px;
        }

        .control-button {
            min-height: 36px;
            padding: 9px 10px;
            background: rgba(9, 132, 227, 0.95);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 650;
            font-size: 13px;
            box-shadow: 0 4px 12px rgba(0, 32, 72, 0.18);
        }

        .control-button.secondary {
            background: rgba(18, 75, 128, 0.58);
            border: 1px solid rgba(255, 255, 255, 0.28);
        }

        .control-button:focus-visible,
        input[type=range]:focus-visible {
            outline: 2px solid rgba(255, 255, 255, 0.9);
            outline-offset: 2px;
        }

        .control-button[aria-pressed="true"] {
            background: rgba(18, 75, 128, 0.9);
        }

        /* 渲染容器 */
        #webgl-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #css3d-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        #loading-layer {
            position: absolute;
            inset: 0;
            z-index: 200;
            display: grid;
            place-items: center;
            background: #020710;
            color: #fff;
            transition: opacity 500ms ease, visibility 500ms ease;
        }

        #loading-layer.is-hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-panel {
            width: min(320px, calc(100vw - 48px));
            padding: 22px;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            box-shadow: 0 24px 80px rgba(0,0,0,0.45);
        }

        .loader-track {
            height: 3px;
            margin-top: 14px;
            overflow: hidden;
            background: rgba(255,255,255,0.18);
            border-radius: 999px;
        }

        .loader-bar {
            width: 42%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, rgba(255,255,255,0.18), #7ec8ff, rgba(255,255,255,0.18));
            animation: loading-sweep 1.2s ease-in-out infinite;
        }

        #loading-title { font-size: 14px; font-weight: 700; }
        #loading-detail { margin-top: 8px; font-size: 12px; opacity: 0.72; }

        @keyframes loading-sweep {
            0% { transform: translateX(-105%); }
            100% { transform: translateX(245%); }
        }

        .space-door {
            position: relative;
            width: 148px;
            height: 222px;
            border: 0;
            padding: 0;
            color: #1d2d3c;
            background: transparent;
            cursor: pointer;
            pointer-events: auto;
            transform-origin: 50% 100%;
            filter: drop-shadow(0 16px 22px rgba(0, 20, 38, 0.28));
            transition: filter 420ms ease;
            user-select: none;
            perspective: 680px;
        }

        .space-door:hover,
        .space-door:focus-visible {
            filter:
                drop-shadow(0 16px 22px rgba(0, 20, 38, 0.28))
                drop-shadow(0 0 18px var(--door-light));
            outline: none;
        }

        .space-door__inner {
            position: absolute;
            inset: 0;
            transform-style: preserve-3d;
        }

        .space-door__frame {
            position: absolute;
            inset: 0;
            border: 10px solid rgba(238, 216, 172, 0.98);
            border-radius: 4px;
            background:
                linear-gradient(90deg, rgba(82, 56, 30, 0.26), transparent 18%, rgba(255,255,255,0.18) 52%, rgba(72, 44, 22, 0.20)),
                linear-gradient(135deg, #f8e5b7, #b9884e);
            box-shadow:
                inset 0 0 0 2px rgba(72, 44, 22, 0.28),
                inset 0 -18px 24px rgba(60, 30, 12, 0.18),
                0 0 0 1px rgba(255,255,255,0.28),
                0 0 16px rgba(126, 200, 255, 0.14);
            transform: translateZ(18px);
            transform-style: preserve-3d;
        }

        .space-door__back {
            position: absolute;
            inset: 0;
            border-radius: 4px;
            background: linear-gradient(135deg, rgba(58, 36, 18, 0.84), rgba(149, 98, 44, 0.74));
            transform: translateZ(-64px);
            box-shadow: inset 0 0 0 10px rgba(45, 29, 14, 0.72);
        }

        .space-door__frame::before,
        .space-door__frame::after {
            content: "";
            position: absolute;
            top: -10px;
            bottom: 4px;
            width: 34px;
            background: linear-gradient(90deg, #6f4926, #d7aa64);
            transform-style: preserve-3d;
        }

        .space-door__frame::before {
            left: -36px;
            transform: rotateY(90deg);
            transform-origin: right center;
        }

        .space-door__frame::after {
            right: -36px;
            transform: rotateY(-90deg);
            transform-origin: left center;
        }

        .space-door__threshold {
            position: absolute;
            left: -10px;
            right: -10px;
            bottom: -12px;
            height: 18px;
            border-radius: 3px;
            background: linear-gradient(180deg, #ffe0a1, #7b5128);
            box-shadow: 0 5px 12px rgba(0, 20, 38, 0.28);
            transform: rotateX(72deg) translateZ(24px);
            transform-origin: top center;
        }

        .space-door__top-depth {
            position: absolute;
            left: -10px;
            right: -10px;
            top: -12px;
            height: 22px;
            border-radius: 3px;
            background: linear-gradient(180deg, #f7d893, #7d5228);
            transform: rotateX(-72deg) translateZ(24px);
            transform-origin: bottom center;
        }

        .space-door__portal {
            position: absolute;
            inset: 24px 24px 18px;
            overflow: hidden;
            border-radius: 3px;
            background:
                radial-gradient(circle at 50% 42%, rgba(255,255,245,1), rgba(100,235,255,0.92) 18%, rgba(122,80,255,0.72) 42%, rgba(13,16,54,1) 78%),
                conic-gradient(from 20deg, rgba(255,255,255,0.36), rgba(74,220,255,0.86), rgba(255,104,220,0.68), rgba(255,255,255,0.30));
            box-shadow:
                inset 0 0 24px rgba(255,255,255,0.86),
                inset 0 0 58px rgba(77, 180, 255, 0.76),
                0 0 34px rgba(117, 213, 255, 0.58);
            transform: translateZ(30px);
            opacity: 0.96;
            transition: opacity 500ms ease, filter 500ms ease, box-shadow 500ms ease;
            z-index: 1;
        }

        .space-door:hover .space-door__portal,
        .space-door:focus-visible .space-door__portal {
            opacity: 1;
            filter: saturate(1.35) brightness(1.18);
            box-shadow:
                inset 0 0 28px rgba(255,255,255,0.94),
                inset 0 0 72px rgba(77, 180, 255, 0.92),
                0 0 46px rgba(117, 213, 255, 0.78);
        }

        .space-door__portal::before,
        .space-door__portal::after {
            content: "";
            position: absolute;
            inset: -35%;
            background:
                radial-gradient(circle at 18% 28%, rgba(255,255,255,0.92) 0 1px, transparent 2px),
                radial-gradient(circle at 72% 62%, rgba(255,244,177,0.82) 0 1px, transparent 2px),
                radial-gradient(circle at 46% 76%, rgba(158,235,255,0.86) 0 1px, transparent 2px);
            background-size: 46px 42px, 58px 54px, 68px 64px;
            animation: portal-drift 12s linear infinite;
            opacity: 0.8;
        }

        .space-door__portal::after {
            background:
                radial-gradient(ellipse at center, transparent 0 28%, rgba(255,255,255,0.24) 29%, transparent 33%),
                conic-gradient(from 0deg, transparent, rgba(255,255,255,0.22), transparent, rgba(122,220,255,0.26), transparent);
            animation: portal-spin 8s linear infinite;
            opacity: 0.56;
        }

        .space-door__light {
            position: absolute;
            inset: 20px 22px 16px;
            border-radius: 2px;
            background:
                radial-gradient(circle at 50% 48%, rgba(255,255,225,0.92), rgba(255,210,125,0.36) 34%, rgba(96,190,255,0.16) 62%, rgba(96,190,255,0) 100%);
            opacity: 0;
            transform: translateZ(32px);
            transition: opacity 720ms ease;
        }

        .space-door:hover .space-door__light,
        .space-door:focus-visible .space-door__light {
            opacity: 1;
        }

        .space-door__panel {
            position: absolute;
            inset: 26px 26px 18px;
            border-radius: 3px;
            background:
                linear-gradient(90deg, rgba(255,255,255,0.24), transparent 18%, rgba(0,0,0,0.08) 21%, transparent 24%, rgba(255,255,255,0.12) 62%, transparent),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.08) 0 1px, rgba(0,0,0,0.05) 1px 3px, transparent 3px 18px),
                linear-gradient(180deg, var(--door-light), var(--door-color));
            box-shadow:
                inset 0 0 0 2px rgba(255,255,255,0.38),
                inset 10px 0 18px rgba(255,255,255,0.15),
                inset -12px 0 16px rgba(0, 0, 0, 0.18),
                0 0 0 1px rgba(0,0,0,0.16);
            transform-origin: left center;
            transform: translateZ(34px);
            transition: transform 900ms cubic-bezier(.2,.7,.18,1), box-shadow 720ms ease;
            transform-style: preserve-3d;
        }

        .space-door:hover .space-door__panel,
        .space-door:focus-visible .space-door__panel {
            transform: translateZ(34px) rotateY(-86deg);
            box-shadow:
                inset 0 0 0 2px rgba(255,255,255,0.5),
                inset 10px 0 18px rgba(255,255,255,0.18),
                inset -16px 0 22px rgba(0, 0, 0, 0.22),
                14px 0 24px rgba(255, 224, 150, 0.34);
        }

        .space-door__panel-edge {
            position: absolute;
            top: 0;
            right: -24px;
            width: 24px;
            height: 100%;
            background: linear-gradient(90deg, rgba(42, 24, 12, 0.55), rgba(255,255,255,0.18));
            transform: rotateY(90deg);
            transform-origin: left center;
        }

        .space-door__panel::before,
        .space-door__panel::after {
            content: "";
            position: absolute;
            left: 12px;
            right: 12px;
            height: 2px;
            background: rgba(255,255,255,0.45);
            box-shadow: 0 34px 0 rgba(255,255,255,0.24);
        }

        .space-door__panel::before { top: 52px; }
        .space-door__panel::after { bottom: 52px; }

        .space-door__knob {
            position: absolute;
            right: 10px;
            top: 92px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 32%, #fff3b0, #f6b94d 55%, #9b681d);
            box-shadow: 0 0 10px rgba(255, 208, 106, 0.52);
            transform: translateZ(44px);
        }

        .space-door__sign {
            position: absolute;
            left: 50%;
            top: -50px;
            width: 122px;
            padding: 6px 8px 7px;
            border-radius: 4px;
            background: rgba(255, 249, 225, 0.94);
            border: 1px solid rgba(92, 58, 24, 0.28);
            box-shadow: 0 6px 14px rgba(0, 24, 48, 0.14);
            text-align: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 8;
            transform: translateX(-50%) translateZ(56px);
        }

        .space-door__title {
            display: block;
            font-size: 15px;
            line-height: 1.05;
            font-weight: 800;
        }

        .space-door__subtitle {
            display: block;
            margin-top: 3px;
            font-size: 9px;
            line-height: 1.1;
            color: rgba(29, 45, 60, 0.68);
            font-weight: 650;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        @keyframes portal-drift {
            0% { transform: translate3d(0, 0, 0) scale(1); }
            100% { transform: translate3d(46px, -42px, 0) scale(1.04); }
        }

        @keyframes portal-spin {
            0% { transform: rotate(0deg) scale(0.95); }
            100% { transform: rotate(360deg) scale(0.95); }
        }

        @media (max-width: 720px) {
            #ui-layer {
                top: auto;
                left: 10px;
                right: 10px;
                bottom: calc(10px + env(safe-area-inset-bottom));
                width: auto;
                padding: 10px;
                border-radius: 7px;
            }

            label {
                font-size: 12px;
                margin-bottom: 4px;
            }

            #time-display {
                font-size: 11px;
            }

            .control-row {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 6px;
                margin-top: 9px;
            }

            .control-button {
                min-height: 32px;
                padding: 8px 6px;
                font-size: 11px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .loader-bar { animation: none; transform: none; width: 100%; }
            .space-door__portal::before,
            .space-door__portal::after { animation: none; }
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <label for="time-slider">时间控制</label>
        <input type="range" id="time-slider" min="0" max="100" value="30">
        <div id="time-display">上午 10:00</div>

        <div class="control-row">
            <button class="control-button secondary" id="reset-view" type="button">重置</button>
            <button class="control-button secondary" id="motion-toggle" type="button" aria-pressed="false">暂停</button>
            <button class="control-button" type="button" onclick="window.location.href='/'">首页</button>
        </div>
    </div>

    <div id="loading-layer" role="status" aria-live="polite">
        <div class="loader-panel">
            <div id="loading-title">正在进入空间</div>
            <div id="loading-detail">准备海面、天空和漂浮界面</div>
            <div class="loader-track"><div class="loader-bar"></div></div>
        </div>
    </div>

    <div id="webgl-container"></div>
    <div id="css3d-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';
        import { Sky } from 'three/addons/objects/Sky.js';
        import { Water } from 'three/addons/objects/Water.js';

        let camera, scene, renderer, cssRenderer;
        let controls, waterMesh, backingMesh, sunMesh, sunHalo, sunCorona, sky;
        let dirLight, ambientLight;
        let webObject, panelFrame, contactShadow, panelReflection;
        let doorGroup, floatingDoors = [];
        let clouds = []; // 存储云朵数组
        let clock = new THREE.Clock();
        let loadingManager, loadingLayer, motionToggleButton;
        let motionPaused = false;
        let isInteracting = false;
        let cameraHome, targetHome;
        let currentPanelScale = 1;
        let doorPointerStart = null;
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        // 场景参数
        const params = {
            waterLevel: 0,
            webHeight: 150,
            sunDistance: 1500, // 太阳距离中心的半径
            panelWidth: 840,
            panelHeight: 840,
            doorScale: 0.62,
            doorHeight: 222,
            doorWaterInset: 48,
        };

        // 颜色定义
        const Colors = {
            SkyDay: new THREE.Color(0x70c5ff),     // 晴朗蓝天
            SkySunset: new THREE.Color(0xed7866),  // 晚霞红
            SkyNight: new THREE.Color(0x0c0c26),   // 深夜蓝黑
            
            SunDay: new THREE.Color(0xffffff),
            SunSunset: new THREE.Color(0xffaa00),
            
            Water: new THREE.Color(0x006994),      // 深海蓝
            PanelWarm: new THREE.Color(0xfff6e6),
            PanelCool: new THREE.Color(0xd8ecff),
        };

        try {
            init();
            animate();
        } catch (error) {
            showLoadError(error);
        }

        function init() {
            loadingLayer = document.getElementById('loading-layer');
            motionToggleButton = document.getElementById('motion-toggle');
            loadingManager = new THREE.LoadingManager();
            loadingManager.onLoad = hideLoadingLayer;
            loadingManager.onError = () => {
                document.getElementById('loading-detail').innerText = '部分远程纹理加载失败，已使用基础渲染';
                window.setTimeout(hideLoadingLayer, 900);
            };

            scene = new THREE.Scene();
            scene.background = Colors.SkyDay;
            scene.fog = new THREE.FogExp2(0xb8ddff, 0.00012);

            // 1. 相机 (加大 far 参数，看清远处)
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 10000);
            currentPanelScale = getPanelScale();
            cameraHome = new THREE.Vector3(0, isMobileViewport() ? 330 : 260, isMobileViewport() ? 1560 : 1100);
            targetHome = new THREE.Vector3(0, isMobileViewport() ? 120 : 155, isMobileViewport() ? 760 : 560);
            camera.position.copy(cameraHome);

            // 2. 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.78;
            // 开启阴影
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; // 软阴影
            document.getElementById('webgl-container').appendChild(renderer.domElement);

            cssRenderer = new CSS3DRenderer();
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
            cssRenderer.domElement.style.pointerEvents = 'auto';
            document.getElementById('css3d-container').appendChild(cssRenderer.domElement);

            // 3. 光照系统
            // 环境光：模拟天空的漫反射
            ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            // 主光源 (太阳)：使用 DirectionalLight 模拟远处的太阳光，产生平行阴影
            dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.castShadow = true;
            
            // 优化阴影范围，确保能覆盖网页和海面
            const d = 1000;
            dirLight.shadow.camera.left = -d;
            dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d;
            dirLight.shadow.camera.bottom = -d;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 5000;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            // 4. 太阳实体：用面向镜头的太阳盘和多层光晕模拟真实太阳观感
            createSunVisuals();

            // 5. 真实天空和海平面
            createSky();
            createWater();

            // 6. 云朵 (生成一些随机云)
            createClouds();

            // 7. 浮在水面上的导航门。
            createFloatingDoors();

            // 8. 控制器
            controls = new OrbitControls(camera, cssRenderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.055;
            controls.target.copy(targetHome);
            controls.maxPolarAngle = Math.PI / 2 - 0.02; // 稍微限制，别看穿水面
            controls.minDistance = isMobileViewport() ? 760 : 350;
            controls.maxDistance = 2800;
            controls.addEventListener('start', () => { isInteracting = true; });
            controls.addEventListener('end', () => { isInteracting = false; });

            // 事件
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('pointerdown', onGlobalPointerDown, true);
            window.addEventListener('pointerup', onGlobalPointerUp, true);
            document.getElementById('time-slider').addEventListener('input', (e) => updateTime(e.target.value));
            document.getElementById('reset-view').addEventListener('click', resetView);
            motionToggleButton.addEventListener('click', toggleMotion);

            if (prefersReducedMotion) {
                setMotionPaused(true);
            }

            // 初始化时间 (早晨)
            updateTime(30);
        }

        function isMobileViewport() {
            return window.innerWidth <= 720;
        }

        function getPanelScale() {
            return isMobileViewport() ? 0.68 : 1;
        }

        function getDoorScale() {
            return isMobileViewport() ? 0.52 : params.doorScale;
        }

        function applyResponsiveSceneSizing() {
            currentPanelScale = getPanelScale();
            cameraHome.set(0, isMobileViewport() ? 330 : 260, isMobileViewport() ? 1560 : 1100);
            targetHome.set(0, isMobileViewport() ? 120 : 155, isMobileViewport() ? 760 : 560);
            controls.minDistance = isMobileViewport() ? 760 : 350;

            if (webObject) webObject.scale.setScalar(currentPanelScale);
            if (panelFrame) panelFrame.scale.setScalar(currentPanelScale);
            if (backingMesh) backingMesh.scale.setScalar(currentPanelScale);
            if (contactShadow) contactShadow.scale.setScalar(currentPanelScale);
            if (panelReflection) panelReflection.scale.setScalar(currentPanelScale);
            positionFloatingDoors();
        }

        function hideLoadingLayer() {
            window.setTimeout(() => {
                loadingLayer.classList.add('is-hidden');
            }, 250);
        }

        function showLoadError(error) {
            console.error(error);
            const title = document.getElementById('loading-title');
            const detail = document.getElementById('loading-detail');
            title.innerText = '空间暂时无法渲染';
            detail.innerText = '当前浏览器或设备未开启 WebGL';
            document.body.style.background = '#020710';
        }

        function resetView() {
            camera.position.copy(cameraHome);
            controls.target.copy(targetHome);
            controls.update();
        }

        function setMotionPaused(paused) {
            motionPaused = paused;
            motionToggleButton.setAttribute('aria-pressed', String(paused));
            motionToggleButton.innerText = paused ? '继续' : '暂停';
        }

        function toggleMotion() {
            setMotionPaused(!motionPaused);
        }

        function onGlobalPointerDown(event) {
            const door = getDoorFromPoint(event.clientX, event.clientY);
            doorPointerStart = door ? { x: event.clientX, y: event.clientY, href: door.dataset.href } : null;
        }

        function onGlobalPointerUp(event) {
            if (!doorPointerStart) return;

            const dx = event.clientX - doorPointerStart.x;
            const dy = event.clientY - doorPointerStart.y;
            const door = getDoorFromPoint(event.clientX, event.clientY);
            const href = door?.dataset.href || doorPointerStart.href;
            doorPointerStart = null;

            if (dx * dx + dy * dy > 64 || !href) return;
            event.preventDefault();
            window.location.href = href;
        }

        function getDoorFromPoint(x, y) {
            const element = document.elementFromPoint(x, y);
            return element ? element.closest('.space-door') : null;
        }

        function createPanelPhysicalShell(position) {
            panelFrame = new THREE.Group();
            panelFrame.position.copy(position);
            panelFrame.scale.setScalar(currentPanelScale);

            const backMat = new THREE.MeshStandardMaterial({
                color: 0xf8f5ef,
                roughness: 0.55,
                metalness: 0.02
            });
            const edgeMat = new THREE.MeshStandardMaterial({
                color: 0xecf3f8,
                roughness: 0.35,
                metalness: 0.08
            });

            const backPlate = new THREE.Mesh(
                new THREE.BoxGeometry(params.panelWidth + 28, params.panelHeight + 28, 22),
                backMat
            );
            backPlate.position.z = -18;
            backPlate.visible = false;
            backPlate.castShadow = false;
            backPlate.receiveShadow = true;
            panelFrame.add(backPlate);

            const sideThickness = 10;
            const edgeDepth = 18;
            const horizontalEdge = new THREE.BoxGeometry(params.panelWidth + 24, sideThickness, edgeDepth);
            const verticalEdge = new THREE.BoxGeometry(sideThickness, params.panelHeight + 24, edgeDepth);
            const edgePositions = [
                [0, params.panelHeight / 2 + 12, -2, horizontalEdge],
                [0, -params.panelHeight / 2 - 12, -2, horizontalEdge],
                [-params.panelWidth / 2 - 12, 0, -2, verticalEdge],
                [params.panelWidth / 2 + 12, 0, -2, verticalEdge],
            ];

            edgePositions.forEach(([x, y, z, geometry]) => {
                const edge = new THREE.Mesh(geometry, edgeMat);
                edge.position.set(x, y, z);
                edge.castShadow = true;
                edge.receiveShadow = true;
                panelFrame.add(edge);
            });

            scene.add(panelFrame);

            const shadowTexture = createRadialTexture([
                [0, 'rgba(0, 0, 0, 0.34)'],
                [0.45, 'rgba(0, 0, 0, 0.16)'],
                [1, 'rgba(0, 0, 0, 0)']
            ]);
            const shadowMat = new THREE.MeshBasicMaterial({
                map: shadowTexture,
                transparent: true,
                depthWrite: false
            });
            contactShadow = new THREE.Mesh(new THREE.PlaneGeometry(760, 360), shadowMat);
            contactShadow.rotation.x = -Math.PI / 2;
            contactShadow.position.set(position.x, params.waterLevel + 2, position.z + 12);
            contactShadow.renderOrder = 2;
            scene.add(contactShadow);

            const reflectionTexture = createRadialTexture([
                [0, 'rgba(255, 255, 255, 0.22)'],
                [0.35, 'rgba(218, 235, 255, 0.12)'],
                [1, 'rgba(255, 255, 255, 0)']
            ]);
            const reflectionMat = new THREE.MeshBasicMaterial({
                map: reflectionTexture,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            panelReflection = new THREE.Mesh(new THREE.PlaneGeometry(520, 280), reflectionMat);
            panelReflection.rotation.x = -Math.PI / 2;
            panelReflection.position.set(position.x, params.waterLevel + 3, position.z + 130);
            panelReflection.renderOrder = 3;
            scene.add(panelReflection);
        }

        function createFloatingDoors() {
            doorGroup = new THREE.Group();
            scene.add(doorGroup);

            const doorSpecs = [
                {
                    label: 'Research',
                    subtitle: 'Statement',
                    href: '/teaching/',
                    color: '#3f7f90',
                    light: '#82c9bd',
                    desktop: { x: -250, z: 650, rotY: 0 },
                    mobile: { x: -116, z: 910, rotY: 0 }
                },
                {
                    label: 'Gallery',
                    subtitle: 'Visual notes',
                    href: '/portfolio/',
                    color: '#8e6f45',
                    light: '#e4c276',
                    desktop: { x: -82, z: 650, rotY: 0 },
                    mobile: { x: -39, z: 910, rotY: 0 }
                },
                {
                    label: 'Posts',
                    subtitle: 'Personal',
                    href: '/talks/',
                    color: '#735e94',
                    light: '#b5a3e8',
                    desktop: { x: 82, z: 650, rotY: 0 },
                    mobile: { x: 39, z: 910, rotY: 0 }
                },
                {
                    label: 'Home',
                    subtitle: 'Main site',
                    href: '/',
                    color: '#4f6f9f',
                    light: '#93b9f0',
                    desktop: { x: 250, z: 650, rotY: 0 },
                    mobile: { x: 116, z: 910, rotY: 0 }
                },
            ];

            doorSpecs.forEach((spec, index) => {
                const door = createFloatingDoor(spec, index);
                doorGroup.add(door);
                floatingDoors.push(door);
            });
            positionFloatingDoors();
        }

        function positionFloatingDoors() {
            floatingDoors.forEach((door) => {
                const layout = isMobileViewport() ? door.userData.mobile : door.userData.desktop;
                const doorScale = getDoorScale();
                const centerY = params.doorHeight * doorScale / 2 - params.doorWaterInset;
                door.position.set(layout.x, centerY, layout.z);
                door.rotation.y = layout.rotY;
                door.userData.baseY = centerY;
                door.children.forEach((child) => child.scale.setScalar(doorScale));
            });
        }

        function createFloatingDoor(spec, index) {
            const group = new THREE.Group();
            group.userData = {
                href: spec.href,
                label: spec.label,
                desktop: spec.desktop,
                mobile: spec.mobile,
                baseY: spec.desktop.y,
                phase: index * 0.86,
            };

            const doorElement = createDoorElement(spec);
            const doorObject = new CSS3DObject(doorElement);
            doorObject.position.set(0, 0, 0);
            doorObject.scale.setScalar(getDoorScale());
            doorObject.userData.href = spec.href;
            group.add(doorObject);

            return group;
        }

        function createDoorElement(spec) {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'space-door';
            button.setAttribute('aria-label', `Open ${spec.label}`);
            button.dataset.href = spec.href;
            button.style.setProperty('--door-color', spec.color);
            button.style.setProperty('--door-light', spec.light);

            button.innerHTML = `
                <span class="space-door__inner">
                    <span class="space-door__sign">
                        <span class="space-door__title">${spec.label}</span>
                        <span class="space-door__subtitle">${spec.subtitle}</span>
                    </span>
                    <span class="space-door__back"></span>
                    <span class="space-door__frame"></span>
                    <span class="space-door__top-depth"></span>
                    <span class="space-door__threshold"></span>
                    <span class="space-door__portal"></span>
                    <span class="space-door__light"></span>
                    <span class="space-door__panel">
                        <span class="space-door__panel-edge"></span>
                        <span class="space-door__knob"></span>
                    </span>
                </span>
            `;

            button.addEventListener('click', (event) => {
                event.preventDefault();
                event.stopPropagation();
            });

            return button;
        }

        function createSky() {
            sky = new Sky();
            sky.scale.setScalar(10000);
            scene.add(sky);

            const skyUniforms = sky.material.uniforms;
            skyUniforms.turbidity.value = 8;
            skyUniforms.rayleigh.value = 2.2;
            skyUniforms.mieCoefficient.value = 0.004;
            skyUniforms.mieDirectionalG.value = 0.82;
        }

        function createWater() {
            const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
            const waterNormals = new THREE.TextureLoader(loadingManager).load(
                'https://threejs.org/examples/textures/waternormals.jpg',
                (texture) => {
                    texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                }
            );

            waterMesh = new Water(waterGeometry, {
                textureWidth: 1024,
                textureHeight: 1024,
                waterNormals,
                sunDirection: new THREE.Vector3(),
                sunColor: 0xffffff,
                waterColor: 0x0b4f6c,
                distortionScale: 2.4,
                fog: Boolean(scene.fog)
            });
            waterMesh.rotation.x = -Math.PI / 2;
            waterMesh.position.y = params.waterLevel;
            waterMesh.receiveShadow = true;
            scene.add(waterMesh);
        }

        function createSunVisuals() {
            const sunDiskTexture = createSunDiskTexture();
            const diskMaterial = new THREE.SpriteMaterial({
                map: sunDiskTexture,
                color: 0xffffff,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });

            sunMesh = new THREE.Sprite(diskMaterial);
            sunMesh.scale.set(112, 112, 1);
            scene.add(sunMesh);

            const haloTexture = createSunHaloTexture();
            const haloMaterial = new THREE.SpriteMaterial({
                map: haloTexture,
                color: 0xffffff,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });

            sunHalo = new THREE.Sprite(haloMaterial);
            sunHalo.scale.set(520, 520, 1);
            scene.add(sunHalo);

            const coronaTexture = createSunCoronaTexture();
            const coronaMaterial = new THREE.SpriteMaterial({
                map: coronaTexture,
                color: 0xffffff,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });

            sunCorona = new THREE.Sprite(coronaMaterial);
            sunCorona.scale.set(880, 880, 1);
            scene.add(sunCorona);
        }

        function createSunDiskTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            const disk = ctx.createRadialGradient(128, 128, 0, 128, 128, 92);
            disk.addColorStop(0, 'rgba(255, 255, 248, 1)');
            disk.addColorStop(0.44, 'rgba(255, 246, 202, 1)');
            disk.addColorStop(0.72, 'rgba(255, 212, 116, 0.96)');
            disk.addColorStop(0.9, 'rgba(255, 168, 72, 0.48)');
            disk.addColorStop(1, 'rgba(255, 168, 72, 0)');
            ctx.fillStyle = disk;
            ctx.fillRect(0, 0, 256, 256);

            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        function createSunHaloTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
            gradient.addColorStop(0, 'rgba(255, 245, 195, 0.95)');
            gradient.addColorStop(0.18, 'rgba(255, 210, 120, 0.55)');
            gradient.addColorStop(0.42, 'rgba(255, 135, 76, 0.20)');
            gradient.addColorStop(1, 'rgba(255, 135, 76, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 256, 256);

            const haloTexture = new THREE.CanvasTexture(canvas);
            haloTexture.colorSpace = THREE.SRGBColorSpace;
            return haloTexture;
        }

        function createSunCoronaTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(256, 256, 18, 256, 256, 256);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.18)');
            gradient.addColorStop(0.2, 'rgba(255, 225, 150, 0.13)');
            gradient.addColorStop(0.48, 'rgba(255, 158, 88, 0.08)');
            gradient.addColorStop(1, 'rgba(255, 158, 88, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 512, 512);

            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        function createRadialTexture(stops) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
            stops.forEach(([offset, color]) => gradient.addColorStop(offset, color));
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 512, 512);
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        function createCloudTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.filter = 'blur(18px)';

            const blobs = [
                [150, 142, 110, 48, 0.78],
                [240, 116, 142, 62, 0.88],
                [330, 142, 124, 52, 0.74],
                [220, 158, 220, 54, 0.48],
                [290, 92, 78, 36, 0.44],
            ];

            blobs.forEach(([x, y, rx, ry, alpha]) => {
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, Math.max(rx, ry));
                gradient.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
                gradient.addColorStop(0.58, `rgba(255, 255, 255, ${alpha * 0.45})`);
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.filter = 'none';
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        // 创建软边云层
        function createClouds() {
            const cloudTexture = createCloudTexture();

            for(let i = 0; i < 22; i++) {
                const material = new THREE.SpriteMaterial({
                    map: cloudTexture,
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.34 + Math.random() * 0.32,
                    depthWrite: false
                });
                const cloud = new THREE.Sprite(material);
                const scale = 360 + Math.random() * 580;
                cloud.scale.set(scale, scale * (0.26 + Math.random() * 0.12), 1);
                cloud.position.set(
                    (Math.random() - 0.5) * 5200,
                    430 + Math.random() * 520,
                    (Math.random() - 0.5) * 3400 - 820
                );
                cloud.renderOrder = 1;
                cloud.userData = {
                    speed: 0.08 + Math.random() * 0.18,
                    baseOpacity: material.opacity,
                    baseY: cloud.position.y,
                    phase: Math.random() * Math.PI * 2,
                };

                scene.add(cloud);
                clouds.push(cloud);
            }
        }

        function clamp01(value) {
            return Math.min(1, Math.max(0, value));
        }

        function smoothstep(edge0, edge1, value) {
            const t = clamp01((value - edge0) / (edge1 - edge0));
            return t * t * (3 - 2 * t);
        }

        // 更新时间逻辑 (0 = 清晨, 50 = 正午, 100 = 黄昏)
        function updateTime(val) {
            val = parseFloat(val);
            const timeDisplay = document.getElementById('time-display');
            
            // 让太阳略微从地平线下升起/落下，地平线附近的暖色会更自然。
            const dayProgress = val / 100;
            const angleDeg = -4 + dayProgress * 188; 
            const angleRad = THREE.MathUtils.degToRad(angleDeg);

            const radius = params.sunDistance;
            const sunX = -Math.cos(angleRad) * radius; 
            const sunY = Math.sin(angleRad) * radius;
            const sunZ = -200; // 稍微偏后一点，防止中午阴影完全消失不好看

            // 1. 设置太阳位置
            dirLight.position.set(sunX, sunY, sunZ);
            sunMesh.position.set(sunX, sunY, sunZ);
            sunHalo.position.copy(sunMesh.position);
            sunCorona.position.copy(sunMesh.position);

            const sunElevation = clamp01(Math.sin(angleRad));
            const horizonAmount = 1 - smoothstep(0.16, 0.66, sunElevation);
            const duskAmount = smoothstep(0.82, 1, dayProgress);
            const dawnAmount = 1 - smoothstep(0, 0.18, dayProgress);
            const warmAmount = Math.max(horizonAmount, dawnAmount * 0.55, duskAmount * 0.75);
            const nightAmount = Math.max(
                1 - smoothstep(0, 0.09, dayProgress),
                smoothstep(0.94, 1, dayProgress)
            );

            const warmSky = new THREE.Color(dayProgress < 0.5 ? 0xffb270 : 0xff715e);
            const skyColor = Colors.SkyDay.clone()
                .lerp(warmSky, warmAmount * 0.78)
                .lerp(Colors.SkyNight, nightAmount * 0.72);
            const sunLightColor = Colors.SunDay.clone().lerp(Colors.SunSunset, warmAmount);
            const ambIntensity = 0.18 + 0.5 * smoothstep(0.04, 0.48, sunElevation) * (1 - nightAmount * 0.7);
            const exposure = 0.52 + 0.34 * smoothstep(0.05, 0.55, sunElevation) - nightAmount * 0.16;
            const haloScale = 440 + 360 * warmAmount;
            const diskScale = 92 + 34 * warmAmount + 18 * horizonAmount;
            const coronaScale = 760 + 360 * warmAmount + 120 * horizonAmount;
            const sunOpacity = sunY < 0 ? 0.22 : 1 - nightAmount * 0.35;
            const hour = Math.round(5.5 + dayProgress * 14);

            sunMesh.material.color.copy(sunLightColor);
            sunMesh.material.opacity = sunOpacity;
            timeDisplay.innerText = `${hour}:00 / ${dayProgress < 0.22 ? '清晨' : dayProgress > 0.78 ? '傍晚' : '白天'}`;

            // 3. 应用颜色
            scene.background = skyColor;
            scene.fog.color.copy(skyColor).lerp(Colors.Water, 0.16 + horizonAmount * 0.16);
            scene.fog.density = 0.00008 + horizonAmount * 0.0001 + nightAmount * 0.00004;
            renderer.toneMappingExposure = exposure;
            dirLight.color = sunLightColor;
            dirLight.intensity = 0.35 + 1.05 * smoothstep(0.02, 0.52, sunElevation);
            ambientLight.color = skyColor; // 环境光跟随天空颜色
            ambientLight.intensity = ambIntensity;
            sunMesh.scale.set(diskScale, diskScale, 1);
            sunHalo.scale.set(haloScale, haloScale, 1);
            sunHalo.material.opacity = sunOpacity * (0.42 + warmAmount * 0.58);
            sunHalo.material.color.copy(sunLightColor);
            sunCorona.scale.set(coronaScale, coronaScale, 1);
            sunCorona.material.opacity = sunOpacity * (0.12 + warmAmount * 0.18);
            sunCorona.material.color.copy(sunLightColor);

            if (sky) {
                const uniforms = sky.material.uniforms;
                uniforms.sunPosition.value.copy(sunMesh.position);
                uniforms.rayleigh.value = 1.15 + 1.25 * (1 - nightAmount);
                uniforms.turbidity.value = 6.8 + warmAmount * 6.2;
                uniforms.mieCoefficient.value = 0.003 + warmAmount * 0.006;
            }

            if (waterMesh) {
                waterMesh.material.uniforms.sunDirection.value.copy(dirLight.position).normalize();
                waterMesh.material.uniforms.sunColor.value.copy(sunLightColor);
                waterMesh.material.uniforms.waterColor.value.copy(Colors.Water).lerp(skyColor, 0.12 + warmAmount * 0.12);
                waterMesh.material.uniforms.distortionScale.value = 2.4 + 0.55 * smoothstep(0.18, 0.62, sunElevation);
            }

            clouds.forEach((cloud) => {
                cloud.material.color.copy(new THREE.Color(0xffffff).lerp(sunLightColor, warmAmount * 0.36).lerp(skyColor, nightAmount * 0.42));
                cloud.material.opacity = cloud.userData.baseOpacity * (0.74 + sunElevation * 0.28) * (1 - nightAmount * 0.42);
            });

            if (panelFrame) {
                const panelColor = Colors.PanelCool.clone().lerp(Colors.PanelWarm, warmAmount * 0.85);
                panelFrame.children.forEach((child) => {
                    child.material.color.copy(panelColor);
                    child.material.emissive = skyColor.clone().multiplyScalar(nightAmount * 0.12);
                });
            }

            if (contactShadow) {
                contactShadow.material.opacity = 0.42 + 0.2 * smoothstep(0.12, 0.58, sunElevation);
            }

            if (panelReflection) {
                panelReflection.material.opacity = 0.34 + 0.22 * smoothstep(0.18, 0.62, sunElevation);
            }
        }

        function onWindowResize() {
            applyResponsiveSceneSizing();
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const t = clock.elapsedTime;
            const motionScale = motionPaused ? 0 : 1;

            // Water shader 自带法线扰动，推进 time 即可得到连续波光。
            if (waterMesh) {
                waterMesh.material.uniforms.time.value += delta * 0.62 * motionScale;
            }

            if (contactShadow) {
                const shadowPulse = 1 + Math.sin(t * 0.8) * 0.025;
                contactShadow.scale.set(
                    currentPanelScale * shadowPulse,
                    currentPanelScale * (0.92 + Math.cos(t * 0.7) * 0.035),
                    1
                );
                contactShadow.position.x = webObject.position.x + Math.sin(t * 0.35) * 10;
                contactShadow.position.z = webObject.position.z + 16 + Math.cos(t * 0.4) * 8;
            }

            if (panelReflection) {
                panelReflection.position.x = webObject.position.x + Math.sin(t * 0.3) * 12;
                panelReflection.position.z = webObject.position.z + 135 + Math.cos(t * 0.35) * 12;
                panelReflection.scale.set(
                    currentPanelScale * (1 + Math.sin(t * 0.6) * 0.04),
                    currentPanelScale * (1 + Math.cos(t * 0.55) * 0.08),
                    1
                );
            }

            floatingDoors.forEach((door) => {
                door.position.y = door.userData.baseY;
                door.rotation.z = 0;
            });

            // 云朵缓慢移动
            clouds.forEach((cloud, idx) => {
                cloud.position.x += cloud.userData.speed * (idx % 2 === 0 ? 1 : -1) * motionScale;
                cloud.position.y = cloud.userData.baseY + Math.sin(t * 0.18 + cloud.userData.phase) * 16 * motionScale;
                // 简单的循环
                if(cloud.position.x > 2600) cloud.position.x = -2600;
                if(cloud.position.x < -2600) cloud.position.x = 2600;
            });

            controls.update();
            renderer.render(scene, camera);
            cssRenderer.render(scene, camera);
        }
