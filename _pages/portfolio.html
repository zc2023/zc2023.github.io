---
layout: archive
title: "Gallery"
permalink: /portfolio/
author_profile: true
---

{% include floating-nav.html %}

{% for section in site.data.gallery %}
  <div class="center">
    <h2>{{ section.title }}</h2>
  </div>

  <div class="gallery-grid">
    {% for item in section.items %}
      <figure class="gallery-card">
        <div class="gallery-card__media">
          <a class="gallery-card__link" href="{{ item.src }}" title="{{ item.alt | default: item.caption | strip_html | escape }}" aria-label="View larger image">
            <img src="{{ item.src }}" alt="{{ item.alt | default: item.caption | escape }}" loading="lazy">
          </a>
        </div>
        <figcaption class="gallery-card__caption">
          {% if item.caption_html %}
            {{ item.caption_html }}
          {% else %}
            {{ item.caption }}
          {% endif %}
        </figcaption>
      </figure>
    {% endfor %}
  </div>
  {% endfor %}
